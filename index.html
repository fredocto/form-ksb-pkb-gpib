<!DOCTYPE html>
<html>
<head>
  <title>Form KSB/KP3 PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">



  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }

    .note {
      font-size: 12px;
      color: #777;
      margin-top: 10px;
      text-align: center;
    }

.logo {
  text-align: center;
  margin-bottom: 15px;
}

.logo img {
  width: 120px; opacity: 0.95;
}


  </style>
</head>

<body>

<div class="card">

  </div>

  <h2>Form Khusus KSB dan KP3/KORWIL PKB GPIB</h2>

  <form id="myForm">

    Setelah itu Anda akan diarahkan ke WAG tsb, silahkan klik "Request to Join". Terima Kasih, Tuhan memberkati pelayanan kita bersama.
  </div>
</div>

<script>

  const formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbzjLiRYWj3KlOtQ_WRIJasUJ4oPRR9a1m95McgJIafDfXsWVfiIbrkKej0VD_g6pRgrhg/exec", {
    method: "POST",
    body: formData

  window.location.href = "https://chat.whatsapp.com/BDLzpoNa2s38kn2ZEbAm16";
});
</script>
