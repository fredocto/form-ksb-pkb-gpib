<p class="subtitle">
  Khusus bagi KSB/KP3 yang belum bergabung dalam WAG 
  "KSB/KP3 PKB GPIB Sinodal (Aktif)"
</p>

    <div class="field">

  <option>23 - MUPEL KEP. BABEL</option>
  <option>24 - MUPEL KEPRI</option>
  <option>25 - MUPEL SARIBU</option>
        
      </select>
    </div>

    <div class="field">
      <label>Jemaat</label>
      <select name="jemaat" id="jemaat" required>
        <option value="">Pilih Jemaat</option>        
      </select>
    </div>

    <div class="field">
      <label>Nama Lengkap</label>
      <input name="nama" placeholder="Masukkan nama lengkap" required>
    </div>

    <div class="field">
      <label>Nomor WhatsApp</label>
      <input name="wa" placeholder="08xxxxxxxxxx" required>
    </div>

    <div class="field">
      <label>Jabatan dalam PKB Jemaat</label>
      <select name="jabatan">
        <option value="">Pilih Jabatan</option>
        <option>Ketua</option>
        <option>Wakil Ketua</option>
        <option>Sekretaris</option>
        <option>Wakil Sekretaris</option>
        <option>Bendahara</option>
        <option>Wakil Bendahara</option>
      </select>
    </div>

    <div class="field">
      <label>Peran dalam PKB MUPEL</label>
      <select name="peran">
        <option value="">Tidak Ada</option>
        <option>KP3/KORWIL</option>
        <option>Wakil KP3/KORWIL</option>
        <option>Sekretaris KP3/KORWIL</option>
        <option>Wakil Sekretaris KP3/KORWIL</option>
        <option>Bendahara KP3/KORWIL</option>
        <option>Wakil Bendahara KP3/KORWIL</option>
      </select>
    </div>

    <div class="field">
      <label>Catatan / Pertanyaan (Opsional)</label>
      <textarea name="catatan" rows="4" placeholder="Komentar / Saran"></textarea>
    </div>

    <button type="submit">
      Lanjut request join Grup WA "KSB/KP3 PKB GPIB Sinodal (Aktif)"
    </button>

  </form>

  <div class="note">
    Setelah itu Anda akan diarahkan ke WAG dan klik "Request to Join".<br>
    Terima kasih. Tuhan memberkati 🙏
  </div>

</div>

<script>
document.getElementById("mupel").addEventListener("change", function() {
  const jemaatSelect = document.getElementById("jemaat");
  const selected = this.value;

  // Ambil nama MUPEL tanpa nomor
  let namaMupel = selected.replace(/^\d+\s*-\s*/, "");

  // Reset option pertama (placeholder dinamis)
  jemaatSelect.innerHTML = `<option value="">Pilih Jemaat di ${namaMupel}</option>`;

  // Isi jemaat sesuai MUPEL
  if (dataJemaat[selected]) {
    dataJemaat[selected].forEach(j => {
      const option = document.createElement("option");
      option.value = j;
      option.textContent = j;
      jemaatSelect.appendChild(option);
    });
  }
});

</script>
