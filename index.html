<!DOCTYPE html>
<html>
<head>
  <title>Form PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    h2 {
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-bottom: 20px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }

    .back {
      background: #ccc;
      color: black;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔵 PAGE 1 -->
  <div id="page1" class="page active">
    <h2>Form PKB GPIB</h2>
    <p class="subtitle">
      Khusus bagi KSB/KP3 yang belum bergabung dalam WAG
    </p>

    <button onclick="showPage(2)">Mulai</button>
  </div>

  <!-- 🔵 PAGE 2 -->
  <div id="page2" class="page">
    <h2>Pilih MUPEL</h2>

    <select id="mupel">
      <option value="">Pilih MUPEL</option>
      <option>01 - MUPEL SULSELBARA</option>
      <option>02 - MUPEL BALI-NTB</option>
      <option>12 - MUPEL JAKARTA PUSAT</option>
      <option>13 - MUPEL JAKARTA UTARA</option>
      <option>14 - MUPEL JAKARTA SELATAN</option>
    </select>
  </div>

  <!-- 🔵 PAGE 3 -->
  <div id="page3" class="page">
    <h2>Pilih Jemaat</h2>

    <select id="jemaat">
      <option value="">Pilih Jemaat</option>
    </select>

    <button class="back" onclick="showPage(2)">Back</button>
  </div>

</div>

<script>

// 🔥 DATA SEDERHANA DULU (TEST)
const dataJemaat = {
  "01 - MUPEL SULSELBARA": ["BETHANIA Makassar", "IMMANUEL Makassar"],
  "12 - MUPEL JAKARTA PUSAT": ["ANUGERAH Jakarta Pusat", "PAULUS Jakarta Pusat"]
};

// 🔥 NAVIGATION
function showPage(pageNumber) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + pageNumber).classList.add("active");
}

// 🔥 AUTO NEXT MUPEL
document.getElementById("mupel").addEventListener("change", function() {
  const selected = this.value;

  if (selected) {
    localStorage.setItem("mupel", selected);

    // isi jemaat
    const jemaatSelect = document.getElementById("jemaat");
    jemaatSelect.innerHTML = '<option value="">Pilih Jemaat</option>';

    if (dataJemaat[selected]) {
      dataJemaat[selected].forEach(j => {
        const opt = document.createElement("option");
        opt.value = j;
        opt.textContent = j;
        jemaatSelect.appendChild(opt);
      });
    }

    showPage(3);
  }
});

// 🔥 AUTO NEXT JEMAAT
document.getElementById("jemaat").addEventListener("change", function() {
  const selected = this.value;

  if (selected) {
    localStorage.setItem("jemaat", selected);

    alert("Next: Page 4 (Data Diri)");
  }
});

</script>

</body>
</html>
