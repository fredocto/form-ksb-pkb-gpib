<!DOCTYPE html>
<html>
<head>
  <title>Form PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .page { display: none; }
    .active { display: block; }

    h2 { text-align: center; }

    .subtitle {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-bottom: 20px;
    }

    select, button, input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover { background: #1b5e20; }

    .back {
      background: #ccc;
      color: black;
    }
  </style>
</head>

<body>

<div class="card">

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h2>Form PKB GPIB</h2>
  <p class="subtitle">Khusus bagi KSB/KP3 yang belum bergabung dalam WAG</p>
  <button onclick="showPage(2)">Mulai</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h2>Pilih MUPEL</h2>

  <select id="mupel">
    <option value="">Pilih MUPEL</option>
    <option>01 - MUPEL SULSELBARA</option>
  </select>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <h2>Pilih Jemaat</h2>
  <p id="infoMupel" class="subtitle"></p>

  <select id="jemaat">
    <option value="">Pilih Jemaat</option>
  </select>

  <button class="back" onclick="showPage(2)">Back</button>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
  <h2>Data Diri Pengurus</h2>

  <p class="subtitle" id="infoJemaat"></p>
  <p class="subtitle" id="infoMupel2"></p>

  <input type="text" id="nama" placeholder="Nama Lengkap">
  <input type="tel" id="wa" placeholder="08xxxxxxxxxx">

  <select id="jabatan">
    <option value="">Pilih Jabatan</option>
    <option>Ketua</option>
    <option>Sekretaris</option>
    <option>Bendahara</option>
  </select>

  <button class="back" onclick="showPage(3)">Back</button>
  <button onclick="submitData()">Next</button>
</div>

<!-- PAGE 5 -->
<div id="page5" class="page">
  <h2>Konfirmasi</h2>
  <div id="reviewBox"></div>

  <button class="back" onclick="showPage(4)">Back</button>
  <button id="btnSubmit" onclick="submitFinal()">Submit</button>
</div>

<!-- PAGE 6 -->
<div id="page6" class="page">
  <h2>Terima Kasih 🙏</h2>
  <button onclick="joinWA()">JOIN WAG</button>
</div>

</div>

<script>

// ✅ DATA (SUDAH BENAR)
const dataJemaat = {
  "01 - MUPEL SULSELBARA": [
    {nama:"BETHANIA",kota:"Makassar"},
{nama:"BUKIT ZAITUN",kota:"Makassar"},
{nama:"BAHTERA KASIH",kota:"Makassar"},
{nama:"IMMANUEL",kota:"Makassar"},
{nama:"MANGNGAMASEANG",kota:"Makassar"},
{nama:"PASSAREANG",kota:"Makassar"},
{nama:"BETHEL",kota:"Raha"},
{nama:"IMMANUEL BAUBAU",kota:"Baubau"},
{nama:"IMMANUEL MAJENE",kota:"Kab. Majene"},
{nama:"IMMANUEL WATAMPONE",kota:"Kab. Bone"},
{nama:"IMMANUEL PAREPARE",kota:"Parepare"},
{nama:"PELITA BARAS",kota:"Palu"},
{nama:"SUMBER KASIH",kota:"Kendari"},
{nama:"KANA TOJENG",kota:"Gowa"},
{nama:"SOLA FIDE SARUDU",kota:"Palu"},
{nama:"SINAR KASIH BARAS",kota:"Pasangkayu"},
  ]
};

// NAVIGATION
function showPage(n) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");

  if(n===3){
    let m = localStorage.getItem("mupel");
    document.getElementById("infoMupel").textContent = m;
  }

  if(n===4){
    let nama = localStorage.getItem("namaJemaat");
    let kota = localStorage.getItem("kota");
    let mupel = localStorage.getItem("mupel");

    document.getElementById("infoJemaat").textContent =
      "PKB GPIB " + nama + " " + kota;

    document.getElementById("infoMupel2").textContent = mupel;
  }

  if(n===5){
    document.getElementById("reviewBox").innerHTML = `
      ${localStorage.getItem("nama")} <br>
      ${localStorage.getItem("wa")} <br>
      ${localStorage.getItem("namaJemaat")} - ${localStorage.getItem("kota")}
    `;
  }
}

// MUPEL CHANGE
document.getElementById("mupel").addEventListener("change", function(){
  let val = this.value;
  if(!val) return;

  localStorage.setItem("mupel", val);

  let jemaatSelect = document.getElementById("jemaat");
  jemaatSelect.innerHTML = '<option value="">Pilih Jemaat</option>';

  dataJemaat[val].forEach(j=>{
    let opt = document.createElement("option");
    opt.value = JSON.stringify(j);
    opt.textContent = `${j.nama} ${j.kota}`.trim();
    jemaatSelect.appendChild(opt);
  });

  showPage(3);
});

// JEMAAT CHANGE
document.getElementById("jemaat").addEventListener("change", function(){
  let val = this.value;
  if(!val) return;

  let obj = JSON.parse(val);

  localStorage.setItem("jemaat", val);
  localStorage.setItem("namaJemaat", obj.nama);
  localStorage.setItem("kota", obj.kota);

  showPage(4);
});

// VALIDASI
function submitData(){
  let nama = document.getElementById("nama").value.trim();
  let wa = document.getElementById("wa").value.trim();

  if(!nama){ alert("Nama wajib"); return; }
  if(!wa.match(/^[0-9]{10,15}$/)){ alert("WA tidak valid"); return; }

  localStorage.setItem("nama", nama);
  localStorage.setItem("wa", wa);

  showPage(5);
}

// SUBMIT
let isSubmitting = false;

function submitFinal(){
  if(isSubmitting) return;
  isSubmitting = true;

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "Mengirim...";

  const formData = new FormData();
  ["mupel","nama","wa","namaJemaat","kota"].forEach(k=>{
    formData.append(k, localStorage.getItem(k) || "");
  });

  fetch("https://script.google.com/macros/s/AKfycbwuicLZuRDPf2yrR7x-N-sO9mYXy0Rl3Y-ROerqw-SspRc8370H_RtVb4vCy-xavaQnzw/exec", {
    method:"POST",
    body:formData,
    mode:"no-cors"
  })
  .then(()=>{
    showPage(6);
    localStorage.clear();
  })
  .catch(()=> alert("Gagal kirim"));
}

// WA
function joinWA(){
  window.open("https://chat.whatsapp.com/FjWaQPY95DFIbWuB4wwmAc","_blank");
}

</script>

</body>
</html>
