<!DOCTYPE html>
<html>
<head>
  <title>Form KSB/KP3 PKB GPIB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px 0;
      margin: 0;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 15px;
    }

    .logo img {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 2px; /* 🔥 rapat ke input */
      font-size: 14px;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #2e7d32;
      outline: none;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #1b5e20;
      transform: scale(1.02);
    }

    .note {
      font-size: 12px;
      color: #777;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="logo.png" alt="PKB GPIB">
  </div>

  <h2>Form Khusus KSB PKB Jemaat dan KP3/KORWIL PKB MUPEL GPIB</h2>

  <form id="myForm">

    <div class="field">
      <label>MUPEL</label>
      <select name="mupel" id="mupel" required>
        <option value="">Pilih MUPEL</option>
        <option>DKI Jakarta Pusat</option>
        <option>DKI Jakarta Utara</option>
        <option>DKI Jakarta Selatan</option>
        <option>DKI Jakarta Barat</option>
        <option>DKI Jakarta Timur</option>
      </select>
    </div>

    <div class="field">
      <label>Jemaat</label>
      <select name="jemaat" id="jemaat" required>
        <option value="">Pilih Jemaat</option>
      </select>
    </div>

    <div class="field">
      <label>Nama Lengkap</label>
      <input name="nama" placeholder="Masukkan nama lengkap" required>
    </div>

    <div class="field">
      <label>Nomor WhatsApp</label>
      <input name="wa" placeholder="08xxxxxxxxxx" required>
    </div>

    <div class="field">
      <label>Jabatan dalam PKB Jemaat</label>
      <select name="jabatan">
        <option value="">Pilih Jabatan</option>
        <option>Ketua</option>
        <option>Wakil Ketua</option>
        <option>Sekretaris</option>
        <option>Wakil Sekretaris</option>
        <option>Bendahara</option>
        <option>Wakil Bendahara</option>
      </select>
    </div>

    <div class="field">
      <label>Peran dalam PKB MUPEL</label>
      <select name="peran">
        <option value="">Tidak Ada</option>
        <option>KP3/KORWIL</option>
        <option>Wakil KP3/KORWIL</option>
        <option>Sekretaris KP3/KORWIL</option>
        <option>Wakil Sekretaris KP3/KORWIL</option>
        <option>Bendahara KP3/KORWIL</option>
        <option>Wakil Bendahara KP3/KORWIL</option>
      </select>
    </div>

    <div class="field">
      <label>Catatan / Komentar (Opsional)</label>
      <textarea name="catatan" rows="4" placeholder="Komentar / Saran"></textarea>
    </div>

    <button type="submit">
      Lanjut request join Grup WA "KSB/KP3 PKB GPIB Sinodal (Aktif)"
    </button>

  </form>

  <div class="note">
    Setelah itu Anda akan diarahkan ke WAG dan klik "Request to Join".<br>
    Terima kasih. Tuhan memberkati 🙏
  </div>

</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbwuicLZuRDPf2yrR7x-N-sO9mYXy0Rl3Y-ROerqw-SspRc8370H_RtVb4vCy-xavaQnzw/exec", {
    method: "POST",
    body: formData
  }).catch(() => {});

  window.location.href = "https://chat.whatsapp.com/BDLzpoNa2s38kn2ZEbAm16";
});
</script>

<script>
const dataJemaat = {
  "DKI Jakarta Pusat": ["Bethesda", "Paulus", "Immanuel"],
  "DKI Jakarta Utara": ["Sion", "Ebenhaezer"],
  "DKI Jakarta Selatan": ["Filadelfia", "Maranatha"]
};

document.getElementById("mupel").addEventListener("change", function() {
  const jemaatSelect = document.getElementById("jemaat");
  const selected = this.value;

  jemaatSelect.innerHTML = '<option value="">Pilih Jemaat</option>';

  if (dataJemaat[selected]) {
    dataJemaat[selected].forEach(j => {
      const option = document.createElement("option");
      option.value = j;
      option.textContent = j;
      jemaatSelect.appendChild(option);
    });
  }
});
</script>

</body>
</html>
